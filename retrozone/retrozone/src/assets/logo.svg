<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="none">
  <!-- Glow Effect -->
  <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Controller Body -->
  <rect x="10" y="10" width="80" height="40" rx="10" fill="#050011" stroke="#ff00ff" stroke-width="2" filter="url(#neon-glow)"/>
  
  <!-- D-Pad -->
  <rect x="20" y="25" width="10" height="10" fill="#00ffff" filter="url(#neon-glow)"/>
  <rect x="20" y="18" width="10" height="7" fill="#00ffff" filter="url(#neon-glow)"/>
  <rect x="20" y="35" width="10" height="7" fill="#00ffff" filter="url(#neon-glow)"/>
  <rect x="13" y="25" width="7" height="10" fill="#00ffff" filter="url(#neon-glow)"/>
  <rect x="30" y="25" width="7" height="10" fill="#00ffff" filter="url(#neon-glow)"/>

  <!-- Buttons -->
  <circle cx="70" cy="30" r="4" fill="#fff01f" filter="url(#neon-glow)"/>
  <circle cx="82" cy="22" r="4" fill="#39ff14" filter="url(#neon-glow)"/>
  <circle cx="82" cy="38" r="4" fill="#39ff14" filter="url(#neon-glow)"/>
  
  <!-- Select/Start -->
  <rect x="42" y="35" width="6" height="3" rx="1" fill="#bc13fe" filter="url(#neon-glow)"/>
  <rect x="52" y="35" width="6" height="3" rx="1" fill="#bc13fe" filter="url(#neon-glow)"/>
</svg>
